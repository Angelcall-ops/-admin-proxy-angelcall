<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AngelCall — Connexion SuperAdmin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-background:     #07070c;
      --color-surface:        #0f0f18;
      --color-surface-raised: #14141f;
      --color-border:         rgba(212,175,55,.18);
      --color-border-hover:   rgba(212,175,55,.42);
      --color-gold:           #d4af37;
      --color-gold-soft:      #f0d899;
      --color-gold-dim:       rgba(212,175,55,.12);
      --color-text-primary:   #e8e8f0;
      --color-text-secondary: #a0a0c0;
      --color-text-muted:     #6a6a8a;
      --color-danger:         #e74c3c;
      --color-danger-soft:    rgba(231,76,60,.15);
      --color-success:        #27ae60;
      --radius-medium:        10px;
      --radius-large:         14px;
      --radius-pill:          999px;
      --shadow-card:          0 4px 24px rgba(0,0,0,.4);
      --shadow-modal:         0 24px 80px rgba(0,0,0,.7);
      --transition-base:      .22s ease;
      --font-family:          Inter, 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    html { font-size: 15px; }
    body {
      font-family: var(--font-family);
      background: var(--color-background);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    /* ── CARD ── */
    .login-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-large);
      box-shadow: var(--shadow-modal);
      width: 100%;
      max-width: 400px;
      padding: 40px 36px 36px;
    }
    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-brand .brand-icon { font-size: 2.4rem; display: block; margin-bottom: 8px; }
    .login-brand h1 {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--color-gold-soft);
      letter-spacing: -.01em;
    }
    .login-brand p {
      font-size: 0.76rem;
      color: var(--color-text-muted);
      margin-top: 4px;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
      letter-spacing: .02em;
    }
    .form-control {
      display: block;
      width: 100%;
      padding: 10px 13px;
      background: var(--color-surface-raised);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-medium);
      color: var(--color-text-primary);
      font-size: 0.88rem;
      font-family: var(--font-family);
      outline: none;
      transition: border-color var(--transition-base), box-shadow var(--transition-base);
    }
    .form-control:focus {
      border-color: var(--color-gold);
      box-shadow: 0 0 0 3px rgba(212,175,55,.12);
    }
    .form-control::placeholder { color: var(--color-text-muted); opacity: .7; }
    .form-control:disabled { opacity: .35; cursor: not-allowed; }

    /* ── BUTTON ── */
    .btn-submit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px 20px;
      margin-top: 24px;
      border-radius: var(--radius-pill);
      border: none;
      background: linear-gradient(135deg, var(--color-gold) 0%, #b8962e 100%);
      color: #07070c;
      font-size: 0.9rem;
      font-weight: 800;
      font-family: var(--font-family);
      cursor: pointer;
      transition: all var(--transition-base);
      letter-spacing: .02em;
    }
    .btn-submit:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(212,175,55,.3); }
    .btn-submit:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid rgba(7,7,12,.3);
      border-top-color: #07070c;
      border-radius: 50%;
      animation: spin .55s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR BOX ── */
    .error-box {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 13px;
      border-radius: var(--radius-medium);
      background: var(--color-danger-soft);
      border: 1px solid rgba(231,76,60,.32);
      color: var(--color-danger);
      font-size: 0.82rem;
      font-weight: 600;
      margin-top: 16px;
    }
    .error-box.is-visible { display: flex; }

    /* ── FOOTER ── */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.7rem;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <span class="brand-icon">📞</span>
      <h1>AngelCall SuperAdmin</h1>
      <p>Accès réservé aux administrateurs système</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="inputUsername">Identifiant</label>
        <input
          type="text"
          class="form-control"
          id="inputUsername"
          placeholder="superadmin"
          autocomplete="username"
          required
          autofocus
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="inputPassword">Mot de passe</label>
        <input
          type="password"
          class="form-control"
          id="inputPassword"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
      </div>

      <div class="error-box" id="errorBox">
        <span>⚠️</span>
        <span id="errorMsg">Identifiants incorrects.</span>
      </div>

      <button type="submit" class="btn-submit" id="btnLogin">
        Se connecter
      </button>
    </form>

    <div class="login-footer">AngelCall V13.2.2 &mdash; Environnement Production</div>
  </div>

  <script>
    const API_BASE = '/admin-path';

    const form      = document.getElementById('loginForm');
    const btnLogin  = document.getElementById('btnLogin');
    const errorBox  = document.getElementById('errorBox');
    const errorMsg  = document.getElementById('errorMsg');
    const inputUser = document.getElementById('inputUsername');
    const inputPass = document.getElementById('inputPassword');

    function setLoading(on) {
      btnLogin.disabled = on;
      btnLogin.innerHTML = on
        ? '<span class="spinner"></span> Connexion…'
        : 'Se connecter';
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.add('is-visible');
    }

    function hideError() {
      errorBox.classList.remove('is-visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username = inputUser.value.trim();
      const password = inputPass.value;

      if (!username || !password) {
        showError('Veuillez remplir tous les champs.');
        return;
      }

      setLoading(true);

      try {
        // Timeout de 12 secondes pour prévenir un gel silencieux
        const controller = new AbortController();
        const tid = setTimeout(() => controller.abort(), 12000);

        const res = await fetch(`${API_BASE}/admin-login`, {
          method: 'POST',
          credentials: 'include',          // ← HTTP-Only cookie posé par n8n
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          signal: controller.signal,
        });

        clearTimeout(tid);

        if (res.status === 401) {
          showError('Identifiants incorrects ou compte inactif.');
          return;
        }
        if (res.status === 429) {
          showError('Trop de tentatives. Réessayez dans quelques minutes.');
          return;
        }
        if (!res.ok) {
          showError(`Erreur serveur (${res.status}). Contactez l'équipe technique.`);
          return;
        }

        const data = await res.json().catch(() => null);

        if (data && data.success) {
          // Redirection post-auth — le cookie sessiontoken est posé en HTTP-Only
          window.location.href = data.redirect || 'index.html'
        } else {
          showError(data?.error || 'Réponse inattendue du serveur.');
        }

      } catch (err) {
        if (err.name === 'AbortError') {
          showError('Le serveur ne répond pas (timeout). Vérifiez votre connexion.');
        } else {
          showError('Erreur réseau : ' + err.message);
        }
      } finally {
        setLoading(false);
      }
    });

    // Masquer l'erreur dès que l'utilisateur retape
    [inputUser, inputPass].forEach(el =>
      el.addEventListener('input', hideError)
    );
  </script>
</body>
</html>
